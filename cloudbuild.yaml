# Crypto Vision — Cloud Build → Cloud Run
#
# Trigger: push to main branch
# Usage:   gcloud builds submit --config cloudbuild.yaml .
#
# Substitutions (set in trigger or via --substitutions):
#   _SERVICE_NAME   — Cloud Run service name (default: crypto-vision)
#   _REGION         — GCP region (default: us-central1)
#   _MEMORY         — Memory per instance (default: 1Gi)
#   _CPU            — vCPUs per instance (default: 2)
#   _MIN_INSTANCES  — Min instances to keep warm (default: 1)
#   _MAX_INSTANCES  — Max instances (default: 20)
#   _VPC_CONNECTOR  — VPC connector for Redis (default: crypto-vision-vpc)
#   _SERVICE_ACCOUNT — Cloud Run service account

substitutions:
  _SERVICE_NAME: crypto-vision
  _REGION: us-central1
  _MEMORY: 2Gi
  _CPU: "4"
  _MIN_INSTANCES: "2"
  _MAX_INSTANCES: "500"
  _VPC_CONNECTOR: crypto-vision-vpc
  _SERVICE_ACCOUNT: crypto-vision-run

steps:
  # ── 1. Install dependencies ────────────────────────────────
  - name: node:22-alpine
    id: install
    entrypoint: npm
    args: ["ci"]

  # ── 2. Typecheck ───────────────────────────────────────────
  - name: node:22-alpine
    id: typecheck
    entrypoint: npm
    args: ["run", "typecheck"]
    waitFor: ["install"]

  # ── 3. Lint ────────────────────────────────────────────────
  - name: node:22-alpine
    id: lint
    entrypoint: npm
    args: ["run", "lint"]
    waitFor: ["install"]

  # ── 4. Test ────────────────────────────────────────────────
  - name: node:22-alpine
    id: test
    entrypoint: npm
    args: ["run", "test"]
    waitFor: ["install"]

  # ── 5. Build container image ───────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/crypto-vision/${_SERVICE_NAME}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/crypto-vision/${_SERVICE_NAME}:latest
      - .
    waitFor: ["typecheck", "lint", "test"]

  # ── 6. Push to Artifact Registry ───────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/crypto-vision/${_SERVICE_NAME}
    waitFor: ["build"]

  # ── 7. Deploy to Cloud Run ────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/crypto-vision/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --port=8080
      - --memory=${_MEMORY}
      - --cpu=${_CPU}
      - --min-instances=${_MIN_INSTANCES}
      - --max-instances=${_MAX_INSTANCES}
      - --timeout=60s
      - --concurrency=250
      - --cpu-boost
      - --execution-environment=gen2
      - --vpc-connector=projects/$PROJECT_ID/locations/${_REGION}/connectors/${_VPC_CONNECTOR}
      - --vpc-egress=private-ranges-only
      - --service-account=${_SERVICE_ACCOUNT}@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=NODE_ENV=production,COINGECKO_PRO=true
      - --set-secrets=COINGECKO_API_KEY=COINGECKO_API_KEY:latest,GROQ_API_KEY=GROQ_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest,REDIS_URL=REDIS_URL:latest
    waitFor: ["push"]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/crypto-vision/${_SERVICE_NAME}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/crypto-vision/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
